startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - newrelic_api_key
    properties:
      newrelic_api_key:
        type: string
        description: New Relic API key (User or Admin)
      newrelic_region:
        type: string
        description: Data center region (us or eu)
        default: us
  commandFunction: |-
    (config) => ({
      command: "newrelic-mcp",
      args: [],
      env: {
        NEWRELIC_API_KEY: config.newrelic_api_key,
        NEWRELIC_REGION: config.newrelic_region || "us"
      }
    })
